<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta http-equiv="X-UA-Compatible" content="ie=edge"/>
    <title>Document</title>
    <link rel="stylesheet" type="text/css" href="../../css/aos.css"/>
    <link rel="stylesheet" type="text/css" href="../../css/fancybox.min.css"/>
    <link rel="stylesheet" type="text/css" href="../../css/swiper-bundle.min.css"/>
    <link rel="stylesheet" type="text/css" href="../../css/style.css"/>
  </head>
  <body>
    <div class="wrapper" id="wrapper">
      <header class="header">
        <div class="header__content">
          <div class="header__row"> 
            <div class="header__col logo"><a href="/"><img src="/img/logo_footer.svg" alt="alt"/></a></div>
            <div class="header__col nav">
              <nav class="navbar" id="navbar">
                <ul class="menu">
                  <li class="menu-item current-menu-item"><a href="#">Главная</a></li>
                  <li class="menu-item"><a href="#">Магазин</a></li>
                  <li class="menu-item"><a href="#">О нас</a></li>
                  <li class="menu-item"><a href="#">Контакты</a></li>
                </ul>
                <ul class="action list mobile">
                  <li> <a href="#"><i class="icon_man"> </i></a></li>
                  <li> <a href="#"><i class="icon_loupe"> </i></a></li>
                  <li> <a href="#"><i class="icon_heart"> </i></a></li>
                  <li> <a href="#"><i class="icon_cart"> </i></a></li>
                </ul>
              </nav>
            </div>
            <div class="header__col desktop">
              <ul class="action list">
                <li> <a href="#"><i class="icon_man"> </i></a></li>
                <li> <a href="#"><i class="icon_loupe"> </i></a></li>
                <li> <a href="#"><i class="icon_heart"> </i></a></li>
                <li> <a href="#"><i class="icon_cart"> </i></a></li>
              </ul>
            </div>
            <div class="header__toggle"></div>
          </div>
        </div>
      </header>
      <main class="main_content">
        <!-- begin breadcrumbs-->
        <div class="breadcrumbs section">
          <div class="container_center container_center_right">
            <div class="kama_breadcrumbs"><span><a href="#"><span>Главная</span></a></span><span class="kb_sep"></span><span class="kb_title">Контакты</span></div>
          </div>
        </div>
        <!-- end breadcrumbs-->
      </main>
      <footer class="footer">
        <div class="footer__content">
          <div class="footer__row"><a class="footer__logo" href="/"><img src="/img/logo_footer.svg" alt="Logo"/></a></div>
          <div class="footer__row">
            <div class="footer__links"> <a href="#">Москва, ул. Ленина, 123</a><a href="#">Телефон: +(123) 456 - 7890</a><a href="#">Email: test@select-themes.com</a></div>
            <div class="footer__soc">
              <div class="soc"> 
                <div class="soc__link"><i class="soc__icon icon_facebook"></i><a class="soc__label facebook" href="#">facebook</a></div>
                <div class="soc__link"><i class="soc__icon icon_instagram"></i><a class="soc__label instagram" href="#">instagram</a></div>
                <div class="soc__link"><i class="soc__icon icon_youtube"></i><a class="soc__label youtube" href="#">youtube</a></div>
              </div>
            </div>
          </div>
        </div>
      </footer>
      <div class="toTop"><a href="#wrapper"> <i class="icon_arrow_top_sm"></i></a></div>
      <!-- Begin Modal modalVideo-->
      <div class="modal fade modalVideo" id="modalVideo">
        <div class="modal-dialog">
          <div class="modal-content"><a class="modal-close" href="#" data-dismiss="modal"></a>
            <div class="modal-body"> 
              <div class="modalVideo__wraper"></div>
            </div>
          </div>
        </div>
      </div>
      <!-- End modal modalVideo-->
      <!-- Begin Modal info-->
      <div class="modal fade info" id="info">
        <div class="modal-dialog">
          <div class="modal-content"><a class="modal-close" href="#" data-dismiss="modal"></a>
            <div class="form__message"></div>
          </div>
        </div>
      </div>
      <!-- End modal info-->
      <script src="../../js/jquery.js"></script>
      <script src="../../js/jquery.maskedinput.min.js"></script>
      <script src="../../js/modal.js"></script>
      <script src="../../js/swiper-bundle.min.js"></script>
      <script src="../../js/slider.js"></script>
      <script src="../../js/select2.min.js"></script>
      <script src="../../js/jquery.event.move.js"></script>
      <script src="../../js/jquery.twentytwenty.js"></script>
      <script src="../../js/jquery.marquee.min.js"></script>
      <script src="../../js/aos.js"></script>
      <script src="../../js/fancybox.min.js"></script>
      <script src="../../js/jquery-ui.min.js"></script>
      <script src="../../js/jquery-ui-touch-punch.js"></script>
      <script src="../../js/form.js"></script>
      <script src="../../js/function.js"></script>
    </div>
  </body>
</html>
